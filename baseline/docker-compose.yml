# =============================================================================
# Docker Compose — Production AI System
# =============================================================================
# Run: docker-compose up --build
#
# Services:
#   - api-gateway    :8000  — public entry point
#   - model-service  :8001  — LLM inference (Groq API)
#   - worker-service :8002  — background job processing
#   - nginx          :80    — reverse proxy
#   - postgres       :5432  — durable storage (chat sessions, batch jobs, users)
#   - redis          :6379  — queue/cache backend (optional, for Task 8)
# =============================================================================

services:
  # --- Reverse Proxy ---
  nginx:
    build:
      context: ./infra
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - frontend
    networks:
      - ai-platform-net

  # --- API Gateway ---
  api-gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MODEL_SERVICE_URL=http://model-service:8001
      - WORKER_SERVICE_URL=http://worker-service:8002
      - DATABASE_URL=postgresql+asyncpg://prodigon:prodigon@postgres:5432/prodigon
    depends_on:
      model-service:
        condition: service_started
      worker-service:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ai-platform-net

  # --- Model Service ---
  model-service:
    build:
      context: .
      dockerfile: model_service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    networks:
      - ai-platform-net

  # --- Worker Service ---
  worker-service:
    build:
      context: .
      dockerfile: worker_service/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    environment:
      - MODEL_SERVICE_URL=http://model-service:8001
      - DATABASE_URL=postgresql+asyncpg://prodigon:prodigon@postgres:5432/prodigon
      - QUEUE_TYPE=postgres
    depends_on:
      model-service:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - ai-platform-net

  # --- Frontend ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - ai-platform-net

  # --- Postgres (durable storage) ---
  # Stores chat sessions/messages, batch jobs (survives restarts), and users.
  # The baseline schema is applied via Alembic migrations on gateway/worker
  # startup — see baseline/alembic/.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prodigon
      POSTGRES_PASSWORD: prodigon
      POSTGRES_DB: prodigon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` exits 0 only once the server accepts connections. Other
      # services wait on this via `depends_on.condition: service_healthy` so
      # they don't race the DB on startup.
      test: ["CMD-SHELL", "pg_isready -U prodigon -d prodigon"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks:
      - ai-platform-net

  # --- Redis (optional, used in Task 8) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-platform-net

volumes:
  postgres-data:

networks:
  ai-platform-net:
    driver: bridge
