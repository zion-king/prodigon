; -----------------------------------------------------------------------------
; Alembic config for the Production AI System baseline.
;
; Run migrations from the repo root:
;     cd baseline && alembic upgrade head
;
; The actual database URL is resolved at runtime from $DATABASE_URL
; (see alembic/env.py). The `sqlalchemy.url` entry below is only a
; fallback for CLI autogeneration outside the app process.
; -----------------------------------------------------------------------------

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://prodigon:prodigon@localhost:5432/prodigon

; Use a date-prefixed revision filename so `ls` gives chronological order.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[post_write_hooks]
; (none) — keep migrations deterministic; no auto-formatting side effects.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
